name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  static-tests:
    name: static-tests
    runs-on: [self-hosted, Linux, ARM64, org-pool]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci
      - name: Run vitest
        run: npm test

  version-consistency:
    name: version-consistency
    runs-on: [self-hosted, Linux, ARM64, org-pool]
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - name: Check VERSION / version.json / package.json / Caddyfile agree
        run: |
          set -euo pipefail
          v=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION = $v"

          PKG_VER=$(node -e "process.stdout.write(require('./package.json').version || '')")
          echo "package.json = $PKG_VER"
          if [ "$PKG_VER" != "$v" ]; then
            echo "::error::version mismatch: package.json=$PKG_VER vs VERSION=$v"
            exit 1
          fi

          VER_VER=$(node -e "process.stdout.write(require('./version.json').version || '')")
          echo "version.json = $VER_VER"
          if [ "$VER_VER" != "$v" ]; then
            echo "::error::version mismatch: version.json=$VER_VER vs VERSION=$v"
            exit 1
          fi

          if ! grep -qF "\"version\":\"$v\"" Caddyfile; then
            echo "::error::Caddyfile does not contain version $v"
            exit 1
          fi
          echo "Caddyfile ✓"

          echo "version-consistency OK: $v"

  docker-build:
    name: docker-build
    runs-on: [self-hosted, Linux, ARM64, org-pool]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: oscilloscope:ci-${{ github.sha }}

  smoke:
    name: smoke
    needs: docker-build
    runs-on: [self-hosted, Linux, ARM64, org-pool]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (load)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: oscilloscope:smoke-${{ github.sha }}
      - name: Run container
        run: |
          docker rm -f oscilloscope-smoke-${{ 2>/dev/null || true
          exec 9>>/tmp/docker-smoke.lock
          flock -w 600 -x 9
          trap 'docker rm -f oscilloscope-smoke-${{ 2>/dev/null || true' EXIT
          docker run -d --name oscilloscope-smoke-${{ github.sha }} -p 19080:80 oscilloscope:smoke-${{ github.sha }}
          for i in $(seq 1 15); do
            if curl -fsS http://localhost:19080/healthz > /dev/null 2>&1; then
              echo "ready after ${i}s"; break
            fi
            sleep 1
          done
      - name: Smoke /healthz + /version
        run: |
          set -e
          curl -fsS http://localhost:19080/healthz | grep -q '"status":"ok"'
          curl -fsS http://localhost:19080/version | grep -q '"app":"oscilloscope"'
          echo "smoke OK"
      - name: Cleanup
        if: always()
        run: docker rm -f oscilloscope-smoke-${{ github.sha }} || true
